name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build EXE + Installer on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt pip install -r requirements.txt
          pip install pyinstaller

      - name: Run pytest
        shell: cmd
        run: |
          if exist tests (
            pip install pytest
            pytest -q
          ) else (
            echo No tests folder, skipping.
          )

      - name: Build EXE (PyInstaller onefile windowed)
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          set "ICON_ARG="
          if exist app\assets\icon.ico set "ICON_ARG=--icon app\assets\icon.ico"
          set "DATA_ARGS="
          if exist app\assets    set "DATA_ARGS=!DATA_ARGS! --add-data app\assets;app\assets"
          if exist app\data      set "DATA_ARGS=!DATA_ARGS! --add-data app\data;app\data"
          if exist resources     set "DATA_ARGS=!DATA_ARGS! --add-data resources;resources"
          echo Building with: !ICON_ARG! !DATA_ARGS!
          pyinstaller --noconfirm --clean --onefile --windowed --name RobsCodeWizard !ICON_ARG! !DATA_ARGS! app\main.py
          if not exist dist\RobsCodeWizard.exe (
            echo [ERROR] PyInstaller did not produce dist\RobsCodeWizard.exe
            exit /b 1
          )
          if not exist resources\VDT_CODES.xlsx (
            echo [WARN] resources\VDT_CODES.xlsx not in checkout - EXE will have empty VDT codeset
          )

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Build Installer (Inno Setup)
        shell: cmd
        run: |
          if not exist build\installer.iss (
            echo [ERROR] build\installer.iss not found.
            exit /b 1
          )
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss

      - name: Stage release artifacts
        shell: cmd
        run: |
          if not exist release mkdir release
          if exist dist\RobsCodeWizard.exe        copy /Y dist\RobsCodeWizard.exe        release\
          if exist dist\RobsCodeWizard_Setup.exe  copy /Y dist\RobsCodeWizard_Setup.exe  release\
          dir release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RobsCodeWizard-${{ github.ref_name }}
          path: release/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Rob's Code Wizard ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/RobsCodeWizard.exe
            release/RobsCodeWizard_Setup.exe
